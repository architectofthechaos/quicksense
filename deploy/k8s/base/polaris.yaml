# SPDX-License-Identifier: Apache-2.0
# Polaris — bootstrap Job + Deployment + NodePort Service (8181→30181, 8182 ClusterIP)
# Mirrors docker/docker-compose.yml services `polaris-bootstrap` and `polaris`.
#
# Bootstrap Job entrypoint decision:
#   The polaris-admin-tool image sets its own entrypoint that invokes the tool
#   binary directly. We override command/args to wrap with /bin/sh so that exit
#   code 3 ("already bootstrapped") is treated as success. This means the Job
#   tolerates re-runs (e.g. after cluster recreate with a pre-seeded PVC or
#   when the postgres-data PVC already has the realm).  On a fresh PVC the tool
#   exits 0; on an already-bootstrapped DB it exits 3, which the shell converts
#   to 0.  backoffLimit:6 handles transient postgres-not-ready failures.
#
# KNOWN RISK — dotted env key names:
#   Keys such as `polaris.features."ALLOW_INSECURE_STORAGE_TYPES"` contain dots
#   and quotes that are not valid POSIX shell variable names.  They are written
#   here verbatim because Quarkus reads them directly from the JVM system
#   properties / quarkus env source, not through the shell environment.
#   Whether `kubectl apply` accepts these strings as env[].name values is only
#   confirmed at live apply time (Task A12).  If the apiserver rejects them,
#   the workaround is to set them via a Quarkus application.properties ConfigMap
#   volume-mounted at /deployments/config/application.properties.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: polaris-bootstrap
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: polaris-bootstrap
          image: apache/polaris-admin-tool:1.5.0
          command:
            - /bin/sh
            - -c
          args:
            - >-
              /opt/polaris-admin-tool bootstrap
              --realm=POLARIS
              --credential=POLARIS,root,s3cr3t
              || [ $? -eq 3 ]
          envFrom:
            - configMapRef:
                name: qs-config
            - secretRef:
                name: qs-secrets
          env:
            - name: POLARIS_PERSISTENCE_TYPE
              value: relational-jdbc
            - name: POLARIS_PERSISTENCE_RELATIONAL_JDBC_DATABASE_TYPE
              value: postgresql
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://postgres:5432/$(POSTGRES_DB)"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: "$(POSTGRES_USER)"
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: "$(POSTGRES_PASSWORD)"
---
apiVersion: v1
kind: Service
metadata:
  name: polaris
spec:
  type: NodePort
  selector:
    app: polaris
  ports:
    - name: catalog
      port: 8181
      targetPort: 8181
      nodePort: 30181
    - name: management
      port: 8182
      targetPort: 8182
      # No nodePort — reached in-cluster and via kubectl port-forward
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polaris
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polaris
  template:
    metadata:
      labels:
        app: polaris
    spec:
      containers:
        - name: polaris
          image: apache/polaris:1.5.0
          ports:
            - containerPort: 8181
            - containerPort: 8182
          envFrom:
            - configMapRef:
                name: qs-config
            - secretRef:
                name: qs-secrets
          env:
            - name: POLARIS_PERSISTENCE_TYPE
              value: relational-jdbc
            - name: POLARIS_PERSISTENCE_RELATIONAL_JDBC_DATABASE_TYPE
              value: postgresql
            - name: POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_RETRIES
              value: "10"
            - name: POLARIS_PERSISTENCE_RELATIONAL_JDBC_INITIAL_DELAY_IN_MS
              value: "250"
            - name: POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_DURATION_IN_MS
              value: "10000"
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://postgres:5432/$(POSTGRES_DB)"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: "$(POSTGRES_USER)"
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: "$(POSTGRES_PASSWORD)"
            - name: POLARIS_REALM_CONTEXT_REALMS
              value: POLARIS
            - name: POLARIS_BOOTSTRAP_CREDENTIALS
              value: "POLARIS,root,s3cr3t"
            - name: QUARKUS_OTEL_SDK_DISABLED
              value: "true"
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              value: "$(MINIO_ROOT_USER)"
            - name: AWS_SECRET_ACCESS_KEY
              value: "$(MINIO_ROOT_PASSWORD)"
            # Dotted Quarkus feature-flag keys — see KNOWN RISK note at top of file.
            - name: 'polaris.features."ALLOW_INSECURE_STORAGE_TYPES"'
              value: "true"
            - name: 'polaris.features."ALLOW_SETTING_S3_ENDPOINTS"'
              value: "true"
            - name: 'polaris.features."SUPPORTED_CATALOG_STORAGE_TYPES"'
              value: '["FILE","S3","GCS","AZURE"]'
            - name: polaris.readiness.ignore-severe-issues
              value: "true"
          readinessProbe:
            httpGet:
              path: /q/health
              port: 8182
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /q/health
              port: 8182
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
