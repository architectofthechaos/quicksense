# SPDX-License-Identifier: Apache-2.0
# Keycloak — NodePort Service (8082→30082) + Deployment with realm ConfigMap import
# Mirrors docker/docker-compose.yml service `keycloak`.
#
# The keycloak-realm ConfigMap is created by kind-up.sh (Task A8) from
# docker/keycloak/realm-quicksense.json. Mounting it at /opt/keycloak/data/import
# causes Keycloak to auto-import the realm on start-dev startup.
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  type: NodePort
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      nodePort: 30082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.3.3
          args:
            - start-dev
            - --http-port=8082
            - --import-realm
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: qs-config
            - secretRef:
                name: qs-secrets
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "$(KEYCLOAK_ADMIN)"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: "$(KEYCLOAK_ADMIN_PASSWORD)"
            - name: KC_HEALTH_ENABLED
              value: "true"
          volumeMounts:
            - name: keycloak-realm
              mountPath: /opt/keycloak/data/import
              readOnly: true
            - name: keycloak-theme
              mountPath: /opt/keycloak/themes/quicksense
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: keycloak-realm
          configMap:
            name: keycloak-realm
        - name: keycloak-theme
          configMap:
            name: keycloak-theme
            items:
              - key: theme.properties
                path: login/theme.properties
              - key: login.css
                path: login/resources/css/login.css
              - key: logo.svg
                path: login/resources/img/logo.svg
