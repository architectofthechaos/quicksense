# SPDX-License-Identifier: Apache-2.0
#
# Helm values for kubeflow/spark-operator chart 2.5.1
#
# These are best-effort values based on the chart 2.5.1 value structure.
# The controller runs the live install (task operator-install) and reconciles
# any key-name drift between this file and the actual chart defaults.
#
# Air-gapped constraint: pin every image — NO :latest.
# Chart repo: https://kubeflow.github.io/spark-operator
# Chart version: 2.5.1

# ---------------------------------------------------------------------------
# Operator image — pinned to chart 2.5.1
# Best-effort key names; live install reconciles any drift.
# ---------------------------------------------------------------------------
image:
  registry: ghcr.io
  repository: kubeflow/spark-operator/controller
  tag: "2.5.1"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Watch namespace
#
# The operator watches the `default` namespace for SparkApplication and
# SparkConnect custom resources.  Co-locating the compute in `default` (the
# same namespace as the base stack: postgres/polaris/minio/trino/keycloak)
# ensures that SparkConnect driver/executor pods can resolve short-name
# DNS entries such as `polaris` and `minio` — cross-namespace short-name
# resolution fails because Polaris advertises short-name REST endpoints.
# Live-verified: SPARK WROTE (3 rows via sc://e2e-server:15002) + ROUNDTRIP OK.
#
# The Go API creates SparkConnect CRs in the `default` namespace (SPEC-002 §B.7).
# QS_SPARK_NAMESPACE env var overrides the default if a different ns is required.
#
# chart 2.5.1 key: spark.jobNamespaces
# ---------------------------------------------------------------------------
spark:
  jobNamespaces:
    - default

# ---------------------------------------------------------------------------
# Webhook
#
# Enables the MutatingWebhookConfiguration and ValidatingWebhookConfiguration
# that the operator uses to inject driver/executor sidecars and validate
# SparkApplication/SparkConnect specs.
#
# chart 2.5.1 key: webhook.enable
# ---------------------------------------------------------------------------
webhook:
  enable: true

# ---------------------------------------------------------------------------
# RBAC
#
# The chart's controller ClusterRole covers management of all CRDs it ships,
# including sparkconnects.sparkoperator.k8s.io (present in chart >= 2.5.1).
# No extra RBAC override is required here; this section is a placeholder so
# the live install can add namespace-scoped overrides if needed.
# ---------------------------------------------------------------------------
rbac:
  create: true

# ---------------------------------------------------------------------------
# Operator namespace
#
# The operator itself is installed into `spark-operator`; it watches
# `default` (see spark.jobNamespaces above) where the base stack lives.
# ---------------------------------------------------------------------------
# namespace: spark-operator   # set via --namespace in the helm install command
