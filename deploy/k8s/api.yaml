# SPDX-License-Identifier: Apache-2.0
#
# QuickSense API — Kubernetes manifests
#
# Namespace strategy: the API Deployment, ServiceAccount, and RBAC all live in
# the `quicksense` namespace (same as SparkConnect CRs managed by the operator).
# qs-config/qs-secrets are created in `default` by kind-up.sh; `api-run` copies
# them into `quicksense` before applying this file (see Taskfile api-run target).
# This keeps the ServiceAccount local to the namespace that owns the SparkConnect
# CRs, avoiding any cross-namespace SA reference in the RoleBinding.
#
# Probes: /healthz on port 8080 (registered in main.go).
# Service: ClusterIP port 8090 → container 8080; the e2e script port-forwards it.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: quicksense-api
  namespace: quicksense
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quicksense-api-sparkconnects
  namespace: quicksense
rules:
  - apiGroups:
      - sparkoperator.k8s.io
    resources:
      - sparkconnects
    verbs:
      - create
      - get
      - list
      - delete
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quicksense-api-sparkconnects
  namespace: quicksense
subjects:
  - kind: ServiceAccount
    name: quicksense-api
    namespace: quicksense
roleRef:
  kind: Role
  name: quicksense-api-sparkconnects
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quicksense-api
  namespace: quicksense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quicksense-api
  template:
    metadata:
      labels:
        app: quicksense-api
    spec:
      serviceAccountName: quicksense-api
      containers:
        - name: api
          image: quicksense-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: qs-config
            - secretRef:
                name: qs-secrets
          env:
            - name: QS_SPARK_IMAGE
              value: "quicksense-spark:latest"
            - name: QS_SPARK_NAMESPACE
              value: "quicksense"
            - name: QS_CLUSTER_EXECUTORS
              value: "1"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: quicksense-api
  namespace: quicksense
spec:
  type: ClusterIP
  selector:
    app: quicksense-api
  ports:
    - name: http
      port: 8090
      targetPort: 8080
