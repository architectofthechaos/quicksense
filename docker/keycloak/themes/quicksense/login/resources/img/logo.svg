<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="QuickSense">
  <defs>
    <linearGradient id="qpGrad" x1="14" y1="12" x2="52" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5A48E0"/>
      <stop offset="1" stop-color="#7A6BF5"/>
