# SPDX-License-Identifier: Apache-2.0

spark.sql.extensions                                   org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.quicksense                           org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.quicksense.catalog-impl              org.apache.iceberg.rest.RESTCatalog
spark.sql.catalog.quicksense.uri                       http://polaris:8181/api/catalog
spark.sql.catalog.quicksense.warehouse                 quicksense
spark.sql.catalog.quicksense.credential                ${POLARIS_CLIENT_ID}:${POLARIS_CLIENT_SECRET}
spark.sql.catalog.quicksense.scope                     PRINCIPAL_ROLE:ALL
spark.sql.catalog.quicksense.oauth2-server-uri         http://polaris:8181/api/catalog/v1/oauth/tokens
spark.sql.catalog.quicksense.token-refresh-enabled     true
spark.sql.catalog.quicksense.header.Polaris-Realm      POLARIS
spark.sql.catalog.quicksense.io-impl                   org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.quicksense.s3.endpoint               http://minio:9000
spark.sql.catalog.quicksense.s3.path-style-access      true
spark.sql.catalog.quicksense.s3.access-key-id          ${MINIO_ROOT_USER}
spark.sql.catalog.quicksense.s3.secret-access-key      ${MINIO_ROOT_PASSWORD}
spark.sql.catalog.quicksense.client.region             us-east-1
spark.sql.defaultCatalog                               quicksense
spark.sql.catalogImplementation                        in-memory
spark.hadoop.fs.s3a.endpoint                           http://minio:9000
spark.hadoop.fs.s3a.path.style.access                  true
spark.hadoop.fs.s3a.access.key                         ${MINIO_ROOT_USER}
spark.hadoop.fs.s3a.secret.key                         ${MINIO_ROOT_PASSWORD}
spark.hadoop.fs.s3a.connection.ssl.enabled             false
spark.hadoop.fs.s3a.aws.credentials.provider           org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
