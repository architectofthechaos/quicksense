name: ${COMPOSE_PROJECT_NAME:-quicksense}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-POLARIS}
      POSTGRES_INITDB_ARGS: "--encoding UTF8 --data-checksums"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-POLARIS}"]
      interval: 5s
      timeout: 3s
      retries: 20

  polaris-bootstrap:
    image: apache/polaris-admin-tool:1.5.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_DATABASE_TYPE: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-POLARIS}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command:
      - bootstrap
      - --realm=${POLARIS_REALM:-POLARIS}
      - --credential=${POLARIS_REALM:-POLARIS},${POLARIS_CLIENT_ID:-root},${POLARIS_CLIENT_SECRET:-s3cr3t}

  polaris:
    image: apache/polaris:1.5.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_DATABASE_TYPE: postgresql
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_RETRIES: 10
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_INITIAL_DELAY_IN_MS: 250
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_DURATION_IN_MS: 10000
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-POLARIS}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POLARIS_REALM_CONTEXT_REALMS: ${POLARIS_REALM:-POLARIS}
      POLARIS_BOOTSTRAP_CREDENTIALS: ${POLARIS_REALM:-POLARIS},${POLARIS_CLIENT_ID:-root},${POLARIS_CLIENT_SECRET:-s3cr3t}
      QUARKUS_OTEL_SDK_DISABLED: "true"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      polaris.features."ALLOW_INSECURE_STORAGE_TYPES": "true"
      polaris.features."ALLOW_SETTING_S3_ENDPOINTS": "true"
      polaris.features."SUPPORTED_CATALOG_STORAGE_TYPES": '["FILE","S3","GCS","AZURE"]'
      polaris.readiness.ignore-severe-issues: "true"
    ports:
      - "${POLARIS_PORT:-8181}:8181"
      - "${POLARIS_MANAGEMENT_PORT:-8182}:8182"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-RELEASE.2025-09-07T16-13-09Z}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-mc:
    image: minio/mc:${MINIO_MC_IMAGE_TAG:-RELEASE.2025-08-13T08-35-41Z}
    profiles: ["tools"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" && mc mb --ignore-existing local/\"$${MINIO_BUCKET}\""]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-warehouse}

  spark:
    build:
      context: ..
      dockerfile: docker/spark/Dockerfile
    environment:
      POLARIS_CLIENT_ID: ${POLARIS_CLIENT_ID:-root}
      POLARIS_CLIENT_SECRET: ${POLARIS_CLIENT_SECRET:-s3cr3t}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${SPARK_PORT:-15002}:15002"
      - "${SPARK_UI_PORT:-4040}:4040"
    volumes:
      - ..:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        render-spark-defaults.sh
        /opt/spark/sbin/start-connect-server.sh \
          --conf spark.driver.bindAddress=0.0.0.0 \
          --conf spark.driver.host=spark \
          --conf spark.ui.port=4040
        tail -F /opt/spark/logs/*
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/15002'"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 20s

  trino:
    image: trinodb/trino:481
    depends_on:
      polaris:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POLARIS_CLIENT_ID: ${POLARIS_CLIENT_ID:-root}
      POLARIS_CLIENT_SECRET: ${POLARIS_CLIENT_SECRET:-s3cr3t}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${TRINO_PORT:-8080}:8080"
    volumes:
      - ./trino/etc:/etc/trino
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/v1/info | grep -q '\"starting\" *: *false'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  trino-client:
    build:
      context: ..
      dockerfile: docker/trino-client/Dockerfile
      args:
        TRINO_CLIENT_VERSION: ${TRINO_CLIENT_VERSION:-0.337.0}
    profiles: ["tools"]
    depends_on:
      trino:
        condition: service_healthy
    environment:
      TRINO_HOST: trino
      TRINO_PORT: 8080
    volumes:
      - ..:/workspace
    working_dir: /workspace

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.3.3}
    command: ["start-dev", "--http-port=8082", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-qs-api-secret}
      KEYCLOAK_TEST_PASSWORD: ${KEYCLOAK_TEST_PASSWORD:-qs-password}
    ports:
      - "${KEYCLOAK_PORT:-8082}:8082"
    volumes:
      - ./keycloak/realm-quicksense.json:/opt/keycloak/data/import/realm-quicksense.json:ro
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/8082'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

volumes:
  postgres-data:
  minio-data:
  keycloak-data:
