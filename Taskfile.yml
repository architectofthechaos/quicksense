version: '3'

vars:
  COMPOSE: docker compose --env-file .env -f docker/docker-compose.yml

tasks:
  ensure-env:
    internal: true
    cmds:
      - test -f .env || cp .env.example .env

  up:
    desc: Start the local QuickSense infrastructure stack.
    deps: [ensure-env]
    cmds:
      - scripts/up.sh

  down:
    desc: Stop containers and keep volumes.
    deps: [ensure-env]
    cmds:
      - '{{.COMPOSE}} down'

  clean:
    desc: Stop containers and remove volumes.
    deps: [ensure-env]
    cmds:
      - '{{.COMPOSE}} down -v --remove-orphans'

  ps:
    desc: Show service status and health.
    deps: [ensure-env]
    cmds:
      - '{{.COMPOSE}} ps'

  logs:
    desc: Tail stack logs, optionally for one service with `task logs -- polaris`.
    deps: [ensure-env]
    cmds:
      - '{{.COMPOSE}} logs -f {{.CLI_ARGS}}'

  bootstrap:
    desc: Create the MinIO bucket, Polaris catalog, and verify Keycloak OIDC.
    deps: [ensure-env]
    cmds:
      - scripts/bootstrap.sh

  roundtrip:
    desc: Write Iceberg rows with Spark and read them back with Trino.
    deps: [ensure-env]
    cmds:
      - '{{.COMPOSE}} exec -T spark /opt/spark/bin/spark-submit /workspace/scripts/roundtrip/spark_write.py'
      - '{{.COMPOSE}} run --rm --no-deps trino-client python /workspace/scripts/roundtrip/trino_read.py'

  test:
    desc: Start, bootstrap, and run the raw Spark-to-Trino round-trip.
    cmds:
      - task: up
      - task: bootstrap
      - task: roundtrip

  kind-up:
    desc: Start a local kind Kubernetes cluster for QuickSense.
    deps: [ensure-env]
    cmds:
      - scripts/k8s/kind-up.sh

  kind-bootstrap:
    desc: Bootstrap the kind cluster with MinIO bucket, Polaris catalog, and verify Keycloak OIDC.
    deps: [ensure-env]
    cmds:
      - scripts/k8s/kind-bootstrap.sh

  kind-roundtrip:
    desc: Write Iceberg rows with Spark and read them back with Trino on kind.
    deps: [ensure-env]
    cmds:
      - scripts/k8s/kind-roundtrip.sh

  kind-down:
    desc: Stop and delete the kind cluster.
    cmds:
      - kind delete cluster --name quicksense

  operator-install:
    desc: Install the kubeflow Spark Operator (chart 2.4.0) into the kind cluster.
    deps: [ensure-env]
    cmds:
      - scripts/k8s/operator-install.sh

  api-build:
    desc: Build the QuickSense API image and load it into the kind cluster.
    cmds:
      - docker build -t quicksense-api:dev api/
      - kind load docker-image quicksense-api:dev --name quicksense

  api-run:
    desc: Deploy the QuickSense API to the kind cluster and wait for rollout.
    deps: [ensure-env]
    cmds:
      - |
        set -a && source .env && set +a
        kubectl config use-context kind-quicksense
        kubectl create namespace quicksense --dry-run=client -o yaml | kubectl apply -f -
        kubectl create configmap qs-config --from-env-file=.env -n quicksense --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic qs-secrets \
          --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
          --from-literal=POLARIS_CLIENT_SECRET="${POLARIS_CLIENT_SECRET}" \
          --from-literal=MINIO_ROOT_PASSWORD="${MINIO_ROOT_PASSWORD}" \
          --from-literal=KEYCLOAK_ADMIN_PASSWORD="${KEYCLOAK_ADMIN_PASSWORD}" \
          --from-literal=KEYCLOAK_CLIENT_SECRET="${KEYCLOAK_CLIENT_SECRET}" \
          --from-literal=KEYCLOAK_TEST_PASSWORD="${KEYCLOAK_TEST_PASSWORD}" \
          -n quicksense --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f deploy/k8s/api.yaml
        kubectl rollout status deploy/quicksense-api -n quicksense --timeout=120s

  api-e2e:
    desc: Run the API end-to-end test (Keycloak token → catalog/table → cluster → roundtrip → Trino).
    deps: [ensure-env]
    cmds:
      - scripts/k8s/api-e2e.sh
